<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Hero image placeholder">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e5e5e5"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e7e7e7" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#hg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>

  <g transform="translate(400 310)" fill="none" stroke="#525252" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -190 30 L -150 -40 L 150 -40 L 190 30" />
    <path d="M -215 30 L 215 30 L 215 80 L 180 80 L 180 70 L -180 70 L -180 80 L -215 80 Z" fill="#ffffff"/>
    <path d="M -140 -32 L -90 -32 L -85 25 L -150 25 Z" fill="#f5f5f5"/>
    <path d="M -80 -32 L -10 -32 L -10 25 L -75 25 Z" fill="#f5f5f5"/>
    <path d="M 10 -32 L 80 -32 L 75 25 L 5 25 Z" fill="#f5f5f5"/>
    <path d="M 90 -32 L 140 -32 L 150 25 L 85 25 Z" fill="#f5f5f5"/>
    <circle cx="-130" cy="80" r="32" fill="#1f1f1f" stroke="none"/>
    <circle cx="-130" cy="80" r="14" fill="#a3a3a3" stroke="none"/>
    <circle cx="130" cy="80" r="32" fill="#1f1f1f" stroke="none"/>
    <circle cx="130" cy="80" r="14" fill="#a3a3a3" stroke="none"/>
  </g>

  <g fill="none" stroke="#a3a3a3" stroke-width="2" stroke-dasharray="3 6">
    <path d="M 120 470 Q 400 380 680 470" />
  </g>
  <g fill="#525252">
    <circle cx="120" cy="470" r="6"/>
    <circle cx="680" cy="470" r="6"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#737373" text-anchor="middle">
    <text x="120" y="500">Japan</text>
    <text x="680" y="500">Mongolia</text>
  </g>

  <text x="400" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#a3a3a3" letter-spacing="3">HERO IMAGE PLACEHOLDER</text>
</svg>
