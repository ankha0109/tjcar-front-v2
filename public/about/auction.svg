<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Auction monitoring placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e5e5e5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g transform="translate(400 280)" fill="none" stroke="#a3a3a3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-160" y="-100" width="320" height="200" rx="10"/>
    <line x1="-90" y1="125" x2="90" y2="125"/>
    <line x1="-50" y1="100" x2="-50" y2="125"/>
    <line x1="50" y1="100" x2="50" y2="125"/>
    <rect x="-120" y="-70" width="100" height="40" rx="4" fill="#fca5a5" stroke="none"/>
    <rect x="-10" y="-70" width="60" height="40" rx="4" fill="#86efac" stroke="none"/>
    <rect x="60" y="-70" width="60" height="40" rx="4" fill="#fcd34d" stroke="none"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#d4d4d4"/>
    <line x1="-120" y1="40" x2="60" y2="40" stroke="#d4d4d4"/>
    <line x1="-120" y1="70" x2="40" y2="70" stroke="#d4d4d4"/>
  </g>
  <text x="400" y="500" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#737373">Auction monitoring</text>
</svg>
